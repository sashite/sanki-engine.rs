name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly deep run (heavy, ignored-by-default tests). Monday 04:00 UTC.
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The ref after @ is the toolchain; it matches rust-toolchain.toml (1.96.0).
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `-D warnings` also turns rustc lints (e.g. missing_docs) into errors.
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      # Default suite: lib unit tests, integration tests, and doctests.
      - run: cargo test
      # The differential corpus ships in-repo; run that ignored test explicitly
      # (without pulling in the slow `perft_deep`, which stays for the deep job).
      - run: cargo test --test differential -- --ignored

  docs:
    name: docs
    runs-on: ubuntu-latest
    env:
      # Fail the build on broken intra-doc links and other rustdoc warnings.
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps

  msrv:
    name: msrv (1.81)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.81.0
      - uses: Swatinem/rust-cache@v2
      # rust-toolchain.toml pins 1.96.0, so `+1.81.0` is required to override it
      # and actually verify the declared MSRV builds the library.
      - run: cargo +1.81.0 check

  deep:
    name: deep regression (scheduled)
    runs-on: ubuntu-latest
    # Only on the weekly schedule or a manual dispatch — never on push/PR.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      # Runs everything, including the heavy `perft_deep` and the differential.
      - run: cargo test --release -- --include-ignored
